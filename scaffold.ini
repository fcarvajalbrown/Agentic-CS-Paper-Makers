[project]
name = agentic-cs-paper-makers
language = Go (CLI) + Python (LLM Bridge)

[tree]
agentic-cs-paper-makers/
├── cmd/
│   └── paperflow/
│       └── main.go                       # Entry point
├── internal/
│   ├── cli/
│   │   ├── commands.go                   # All CLI commands (init, start, research, architect, write, review, inbox, finalize, etc.)
│   │   ├── flags.go                      # Flag definitions
│   │   └── help.go                       # Default help printer + ASCII logo (stub)
│   ├── config/
│   │   ├── config.go                     # Config hierarchy: flags > env > local > global
│   │   ├── loader.go                     # Load/save JSON config
│   │   └── defaults.go                   # Default values, model tiers
│   ├── state/
│   │   ├── state.go                      # State machine, checkpoint logic
│   │   ├── checkpoint.go                 # Save/load/resume/rollback
│   │   └── project.go                    # Project directory scaffolding
│   ├── agents/
│   │   ├── orchestrator.go               # Agent dispatch, sequential vs parallel
│   │   ├── runner.go                     # Runs a single agent via Python bridge
│   │   └── registry.go                   # Agent profile registry
│   ├── artifacts/
│   │   ├── schema.go                     # JSON schema definitions (blueprint, draft, review, etc.)
│   │   ├── validator.go                  # Schema validation
│   │   └── store.go                      # Artifact read/write/versioning
│   ├── llm/
│   │   ├── bridge.go                     # Go <-> Python bridge interface
│   │   ├── cache.go                      # Response cache (hash-based)
│   │   └── cost.go                       # Token/cost tracking
│   └── export/
│       ├── markdown.go                   # Finalize agent: assemble paper.md
│       └── pdf.go                        # Optional: pandoc + wkhtmltopdf export
├── pkg/
│   └── embed/
│       └── embed.go                      # go:embed directives for Python scripts + agent profiles
├── python/
│   ├── bridge.py                         # Main Python entry: receives JSON from Go, routes to agents
│   ├── agents/
│   │   ├── research.py                   # Research Agent: arXiv + Semantic Scholar search
│   │   ├── architect.py                  # Socratic Architect: asks questions, builds blueprint
│   │   ├── writer.py                     # Lead Writer: prose generation
│   │   ├── formalist.py                  # Formalist Critic
│   │   ├── game_theorist.py              # Game Theorist Critic
│   │   ├── skeptic.py                    # Skeptic Critic
│   │   ├── meta_reviewer.py              # Meta-Reviewer: contradiction flagger
│   │   └── finalize.py                   # Finalize Agent: citation resolution, bib generation
│   ├── tools/
│   │   ├── search_arxiv.py               # arXiv API wrapper
│   │   └── search_semantic_scholar.py    # Semantic Scholar API wrapper
│   ├── models/
│   │   └── kimi_client.py                # Kimi/Moonshot API client with retry, seed, streaming
│   └── utils/
│       └── ipc.py                        # stdin/stdout JSON IPC handler
├── agents/
│   ├── architect.md                      # Agent profile: Socratic framework builder
│   ├── writer.md                         # Agent profile: Academic prose generator
│   ├── formalist.md                      # Agent profile: Proof correctness critic
│   ├── game_theorist.md                  # Agent profile: Equilibrium/mechanism critic
│   ├── skeptic.md                        # Agent profile: Edge case hunter
│   ├── meta_reviewer.md                  # Agent profile: Contradiction flagger
│   ├── research.md                       # Agent profile: Literature scout
│   └── finalize.md                       # Agent profile: Output assembler
├── schemas/
│   ├── research_context.schema.json      # JSON Schema for research context
│   ├── blueprint.schema.json             # JSON Schema for blueprint
│   ├── draft.schema.json                 # JSON Schema for draft
│   └── review_round.schema.json          # JSON Schema for review round
├── go.mod                                # Go module file
├── go.sum                                # Go dependencies checksum
├── Makefile                              # Build targets: build, test, cross-compile
└── README.md                             # Project README

[notes]
; Go code lives in cmd/ + internal/
; Python bridge scripts embedded via //go:embed from python/ dir
; Agent profiles (.md) embedded via //go:embed from agents/ dir
; JSON schemas embedded for runtime validation
; All actual paper projects are created OUTSIDE this repo via `paperflow init <name>`
