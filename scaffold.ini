[project]
name = agentic-cs-paper-makers
language = Go

[tree]
agentic-cs-paper-makers/
├── cmd/
│   └── paperflow/
│       └── main.go                             # Entry point
├── internal/
│   ├── cli/
│   │   ├── cmd_init.go                         # paperflow init <paper-name>
│   │   ├── cmd_research.go                     # paperflow research
│   │   ├── cmd_architect.go                    # paperflow architect (Socratic loop + human gate)
│   │   ├── cmd_write.go                        # paperflow write
│   │   ├── cmd_review.go                       # paperflow review (dispatch 3 Critics in parallel)
│   │   ├── cmd_inbox.go                        # paperflow inbox (delegates to internal/inbox)
│   │   ├── cmd_finalize.go                     # paperflow finalize
│   │   ├── cmd_export.go                       # paperflow export --pdf
│   │   ├── cmd_status.go                       # paperflow status
│   │   ├── cmd_resume.go                       # paperflow resume
│   │   ├── cmd_rollback.go                     # paperflow rollback --to=<checkpoint>
│   │   ├── cmd_cost_report.go                  # paperflow cost-report
│   │   ├── cmd_validate.go                     # paperflow validate <file.json>
│   │   ├── flags.go                            # Flag definitions
│   │   └── help.go                             # Default help printer + ASCII logo (stub)
│   ├── config/
│   │   ├── config.go                           # Config hierarchy: flags > env > local > global
│   │   ├── loader.go                           # Load/save JSON config
│   │   └── defaults.go                         # Default values, model tiers
│   ├── state/
│   │   ├── state.go                            # State machine, checkpoint logic
│   │   ├── checkpoint.go                       # Save/load/resume/rollback
│   │   └── project.go                          # Project directory scaffolding (.paperflow/)
│   ├── agents/
│   │   ├── orchestrator.go                     # Agent dispatch, sequential vs parallel
│   │   ├── runner.go                           # Runs a single agent: loads profile, calls LLM, validates output
│   │   └── registry.go                         # Agent profile registry (name → embedded .md file)
│   ├── artifacts/
│   │   ├── schema.go                           # JSON schema definitions (embedded)
│   │   ├── validator.go                        # Schema validation
│   │   └── store.go                            # Artifact read/write/versioning
│   ├── llm/
│   │   ├── client.go                      # Kimi/Moonshot REST API client: retry, seed, streaming, tool-use loop
│   │   ├── cache.go                            # Response cache (hash-based, per-project)
│   │   └── cost.go                             # Token/cost tracking
│   ├── tools/
│   │   ├── arxiv.go                            # arXiv API client (search_arxiv tool)
│   │   ├── semantic_scholar.go                 # Semantic Scholar API client (search_semantic_scholar tool)
│   │   └── zenodo.go                           # Zenodo API client (search_zenodo tool)
│   ├── inbox/
│   │   └── inbox.go                            # Interactive reviewer response loop: state, display, dispatch
│   └── export/
│       ├── markdown.go                         # Finalize agent: assemble paper.md
│       └── pdf.go                              # Optional: pandoc + wkhtmltopdf export
├── pkg/
│   └── embed/
│       ├── embed.go                            # go:embed directives for agent profiles + JSON schemas
│       ├── agents/
│       │   ├── research.md                     # Agent profile: Literature scout
│       │   ├── architect.md                    # Agent profile: Socratic framework builder
│       │   ├── writer.md                       # Agent profile: Academic prose generator
│       │   ├── formalist.md                    # Agent profile: Proof correctness critic
│       │   ├── game_theorist.md                # Agent profile: Equilibrium/mechanism critic
│       │   ├── skeptic.md                      # Agent profile: Edge case hunter
│       │   ├── meta_reviewer.md                # Agent profile: Contradiction flagger
│       │   └── finalize.md                     # Agent profile: Output assembler
│       └── schemas/
│           ├── research_context.schema.json    # JSON Schema for research context
│           ├── blueprint.schema.json           # JSON Schema for blueprint
│           ├── draft.schema.json               # JSON Schema for draft
│           └── review_round.schema.json        # JSON Schema for review round
├── go.mod                                      # Go module file
├── go.sum                                      # Go dependencies checksum
├── Makefile                                    # Build targets: build, test, cross-compile
└── README.md                                   # Project README

[notes]
; All logic is Go-only. No Python, no external runtime dependency.
; LLM calls go directly from internal/llm/client.go to the Kimi/Moonshot REST API.
; Web search tools (arXiv, Semantic Scholar) are Go HTTP clients in internal/tools/.
; Agent profiles (.md) and JSON schemas are embedded in the binary via //go:embed in pkg/embed/.
; The tool-use loop (LLM returns function call → Go executes → result fed back) lives in internal/llm/client.go.
; All actual paper projects are created OUTSIDE this repo via `paperflow init <name>`.
